server:
  port: 7012
  servlet:
    context-path: /api

spring:
  application:
    name: ns-bbs-rest
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
  main:
    # 允许类之间的循环引用（springboot2.6版本默认不支持循环依赖了）
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 1000MB
  mvc:
    pathmatch:
      # 解决Spring Boot 2.6.x高版本 和 Swagger 3.0.0 整合异常的问题
      matching-strategy: ant_path_matcher
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      # 单位 毫秒
      timeout: 60000
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1

local:
  services:
    manage-auth:
      name: ns-manage-auth
      url: http://127.0.0.1:7014
    bbs-article:
      name: ns-bbs-article
      url: http://127.0.0.1:7011
    bbs-user:
      name: ns-bbs-user
      url: http://127.0.0.1:7013

# 自定义
interceptor:
  monitor:
    #是否启用监控
    status: true

cookie:
  # cookie写在对应的域名下
  # 本地开发建议留空，使用 host-only cookie，避免 localhost/127.0.0.1 域不一致导致丢失登录态
  domain:

# swagger打开
swagger:
  show: true

file:
  source:
    # 设定上传源文件允许的最大值（1024*1024*5=5M）
    length: 5242880
